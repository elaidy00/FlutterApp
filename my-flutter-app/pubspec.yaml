name: my_flutter_app
description: A modern Flutter E-Learning mobile application ported from Angular.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  fl_chart: ^0.66.0
  intl: ^0.19.0
  go_router: ^17.3.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true